services:
  postgres:
    restart: always

  api:
    build:
      target: prod
    ports:
      - "8000:9000"
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      APP_URL: https://taskmanager.com
      CORS_ALLOWED_ORIGINS: "https://taskmanager.com"
    restart: always

  web:
    build:
      target: prod
    ports:
      - "80:80"
    restart: always
