services:
  postgres:
    ports:
      - "5432:5432"

  api:
    build:
      target: local
    ports:
      - "8000:8000"
    volumes:
      - ../api:/var/www
      - /var/www/vendor
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8000
      CORS_ALLOWED_ORIGINS: "http://localhost:5173"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000"]
      interval: 10s
      retries: 3

  web:
    build:
      target: local
    ports:
      - "5173:5173"
    volumes:
      - ../web:/app
      - /app/node_modules
    environment:
      VITE_API_URL: http://localhost:8000/api
