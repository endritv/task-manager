name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: ["**"]

concurrency:
  group: ci-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  backend:
    name: Backend (PHP 8.5)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: task_manager_test
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      DB_CONNECTION: pgsql
      DB_HOST: 127.0.0.1
      DB_PORT: 5432
      DB_DATABASE: task_manager_test
      DB_USERNAME: user
      DB_PASSWORD: password

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Setup PHP 8.5
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          extensions: pdo, pdo_pgsql, pcov
          coverage: pcov
          tools: composer:v2
          ini-values: opcache.enable_cli=1, opcache.jit=0, pcov.enabled=1

      - name: Cache Composer dependencies
        id: vendor-cache
        uses: actions/cache@v5
        with:
          path: api/vendor
          key: vendor-php85-${{ hashFiles('api/composer.lock') }}
          restore-keys: vendor-php85-

      - name: Prepare environment
        working-directory: api
        run: |
          mkdir -p bootstrap/cache storage/framework/{sessions,views,cache}
          cp .env.example .env

      - name: Install Composer dependencies
        working-directory: api
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Generate app key
        working-directory: api
        run: php artisan key:generate --quiet

      - name: Create parallel test databases
        run: |
          for i in 1 2 3 4 5 6 7 8; do
            PGPASSWORD=password psql -h 127.0.0.1 -U user -d task_manager_test -tc \
              "SELECT 1 FROM pg_database WHERE datname='task_manager_test_${i}'" | grep -q 1 || \
            PGPASSWORD=password psql -h 127.0.0.1 -U user -d task_manager_test -c \
              "CREATE DATABASE task_manager_test_${i};"
          done

      - name: Run migrations
        working-directory: api
        run: php artisan migrate --force --quiet

      - name: Lint (Pint)
        working-directory: api
        run: ./vendor/bin/pint --test

      - name: Run Pest tests (parallel + coverage)
        working-directory: api
        run: |
          php artisan test --parallel --coverage --coverage-clover=coverage.xml --min=100 2>&1 | tee /tmp/test-output.txt
          exit ${PIPESTATUS[0]}

      - name: Write coverage summary
        if: always()
        run: |
          {
            echo "### Backend — Test & Coverage Report"
            echo ""
            TEST_LINE=$(grep -E "^\s+Tests:" /tmp/test-output.txt | tail -1)
            [ -n "$TEST_LINE" ] && echo "> $TEST_LINE"
            echo ""
            echo '```'
            awk '/\.\.\.\./{found=1} found{print} /^[[:space:]]*Total:/{exit}' /tmp/test-output.txt || true
            echo '```'
          } >> $GITHUB_STEP_SUMMARY

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: api-coverage
          path: api/coverage.xml
          retention-days: 7

  frontend:
    name: Frontend (React 19 / Node 24)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Setup Node.js 24
        uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: Cache node_modules
        id: node-cache
        uses: actions/cache@v5
        with:
          path: web/node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('web/package-lock.json') }}
          restore-keys: node-modules-${{ runner.os }}-

      - name: Install dependencies
        if: steps.node-cache.outputs.cache-hit != 'true'
        working-directory: web
        run: npm ci

      - name: Typecheck
        working-directory: web
        run: npx tsc -p tsconfig.app.json --noEmit

      - name: Lint (ESLint)
        working-directory: web
        run: npx eslint . --ignore-pattern 'coverage/**'

      - name: Unit tests + coverage
        working-directory: web
        run: npx vitest run --coverage

      - name: Build
        working-directory: web
        run: npm run build

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: web-coverage
          path: web/coverage/
          retention-days: 7
