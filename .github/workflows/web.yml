name: Web

on:
  push:
    branches: [main]
    paths: [web/**, docker/web/**, .github/workflows/web.yml]
  pull_request:
    branches: ["**"]
    paths: [web/**, docker/web/**, .github/workflows/web.yml]

concurrency:
  group: web-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  frontend:
    name: Frontend (React 19 / Node 24)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Setup Node.js 24
        uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: Cache node_modules
        id: node-cache
        uses: actions/cache@v5
        with:
          path: web/node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('web/package-lock.json') }}
          restore-keys: node-modules-${{ runner.os }}-

      - name: Install dependencies
        if: steps.node-cache.outputs.cache-hit != 'true'
        working-directory: web
        run: npm ci

      - name: Typecheck
        working-directory: web
        run: npx tsc -p tsconfig.app.json --noEmit

      - name: Lint
        working-directory: web
        run: npx eslint . --ignore-pattern 'coverage/**'

      - name: Unit tests + coverage
        working-directory: web
        run: npx vitest run --coverage

      - name: Build
        working-directory: web
        run: npm run build

      - name: Upload coverage report
        if: github.event_name == 'pull_request' && always()
        uses: actions/upload-artifact@v7
        with:
          name: web-coverage
          path: web/coverage/
          retention-days: 7
