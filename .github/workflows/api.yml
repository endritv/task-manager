name: API

on:
  push:
    branches: [main]
    paths: [api/**, docker/api/**]
  pull_request:
    branches: [main]
    paths: [api/**, docker/api/**]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          extensions: pdo, pdo_pgsql, pcov
          coverage: pcov
      - run: composer install --no-interaction --prefer-dist
      - run: ./vendor/bin/pint --test

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    defaults:
      run:
        working-directory: api
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: task_manager_test
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          extensions: pdo, pdo_pgsql, pcov
          coverage: pcov
      - run: composer install --no-interaction --prefer-dist
      - name: Run tests with coverage
        run: ./vendor/bin/pest --coverage --min=100 --coverage-clover=coverage.xml
        env:
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: task_manager_test
          DB_USERNAME: user
          DB_PASSWORD: password
      - name: Upload coverage
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: api-coverage
          path: api/coverage.xml
